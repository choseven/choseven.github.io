<style>
body {
  margin: 0;
  padding: 0;
  background: #000;
  overflow: hidden;
}
object, embed {
  display: block;
}
.side-cover {
  position: fixed;
  top: 0;
  height: 100%;
  background-color: #87ceeb;
  z-index: 9999999;
  pointer-events: none;
}
#cover-left { left: 0; }
#cover-right { right: 0; }
</style>
</head>
<body>

<div id="cover-left" class="side-cover"></div>
<div id="cover-right" class="side-cover"></div>

<script src="https://cdn.jsdelivr.net/gh/u-cvlassrom-y/google@main/ruffle.js"></script>

<object width="100%" height="100%">
    <param name="movie" value="https://cdn.jsdelivr.net/gh/markrosenbaum/some-repo@aeb3030a3fb90987658ff4ee1063c64f6206152f/dl3/ducklife3game.swf">
    <embed src="https://cdn.jsdelivr.net/gh/markrosenbaum/some-repo@aeb3030a3fb90987658ff4ee1063c64f6206152f/dl3/ducklife3game.swf" width="100%" height="100%">
</object>

<script>
  var GAME_RATIO = 2280 / 1440;

  function updateCovers() {
    var vw = window.innerWidth;
    var vh = window.innerHeight;
    var renderedW = vh * GAME_RATIO;
    var cover = Math.max(0, Math.round((vw - renderedW) / 2));
    document.getElementById("cover-left").style.width = cover + "px";
    document.getElementById("cover-right").style.width = cover + "px";
  }

  updateCovers();
  window.addEventListener("resize", updateCovers);
</script>

</body>
</html>
