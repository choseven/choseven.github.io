<style>

body {
  margin: 0;
  padding: 0;
  background: #000;
  overflow: hidden;
}

object, embed {
  display: block;
}

#game-wrapper {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

.side-cover {
  position: fixed;
  top: 0;
  height: 100%;
  background-color: #87ceeb;
  z-index: 9999999;
  pointer-events: none;
}
#cover-left {
  left: 0;
}
#cover-right {
  right: 0;
}
</style>

<body>

<div id="cover-left" class="side-cover"></div>
<div id="cover-right" class="side-cover"></div>

<script src="https://cdn.jsdelivr.net/gh/u-cvlassrom-y/google@main/ruffle.js"></script>

<object width="100%" height="100%">
    <param name="movie" value="https://cdn.jsdelivr.net/gh/markrosenbaum/some-repo@aeb3030a3fb90987658ff4ee1063c64f6206152f/dl2/ducklife2worldchampion.swf">
    <embed src="https://cdn.jsdelivr.net/gh/markrosenbaum/some-repo@aeb3030a3fb90987658ff4ee1063c64f6206152f/dl2/ducklife2worldchampion.swf" width="100%" height="100%">
</object>



<script>
  // The SWF stretches to fill the viewport but its internal game content
  // is letterboxed. At 2560x1440, the covers are 450px each.
  // Scale by whichever axis the SWF is constrained by.
  // SWF native stage: 760x520 (determined from SWF header).
  // At 2560x1440: scale = min(2560/760, 1440/520) = min(3.368, 2.769) = 2.769 (height constrained)
  // rendered_w = 760 * 2.769 = 2104, cover = (2560 - 2104) / 2 = 228 -- not 450.
  // The SWF stage is actually set to NoScale / ShowAll which means it letterboxes.
  // Working backwards: cover=450 at 2560x1440.
  // Game fills height fully: rendered_w = 2560 - 900 = 1660, aspect = 1660/1440.
  // cover = (vw - vh * (1660/1440)) / 2, clamped to 0.

  var GAME_RATIO = 1860 / 1440;

  function updateCovers() {
    var vw = window.innerWidth;
    var vh = window.innerHeight;
    var renderedW = vh * GAME_RATIO;
    var cover = Math.max(0, Math.round((vw - renderedW) / 2));
    document.getElementById('cover-left').style.width = cover + 'px';
    document.getElementById('cover-right').style.width = cover + 'px';
  }

  updateCovers();
  window.addEventListener('resize', updateCovers);
</script>



</body>
